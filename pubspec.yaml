name: safemind
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  

  # ── Localisation ────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # ── State Management ────────────────────────
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # ── Files & Documents ───────────────────────
  file_picker: ^10.1.9
  printing: ^5.11.0
  pdf: ^3.10.7
  share_plus: ^7.2.1
  open_filex: ^4.5.0
  dio: ^5.4.0

  # ── QR & Signature ──────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  signature: ^5.4.0

  # ── Video ───────────────────────────────────
  video_player: ^2.8.3
  chewie: ^1.7.4

  # ── UI ──────────────────────────────────────
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.5
  fl_chart: ^0.66.0

  # ── Network ─────────────────────────────────
  http: ^1.6.0

  # ── Backend (Supabase) ──────────────────────
  supabase_flutter: ^2.12.2

  # ── Firebase ────────────────────────────────
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # ── Calls (Agora) ───────────────────────────
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.0.0

  # ── Media ───────────────────────────────────
  image_picker: ^1.2.1
  path_provider: ^2.1.0
  uuid: ^4.5.3

  # ── Voice / Audio ───────────────────────────
  record: ^6.1.1
  audioplayers: ^6.0.0

  # ── Maps & Location ─────────────────────────
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.0
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geocoding: ^3.0.0

  # ── Speech ──────────────────────────────────
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # ── Notifications ───────────────────────────
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # ── External ────────────────────────────────
  url_launcher: ^6.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/